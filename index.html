<!DOCTYPE html>
<html>
<head>
    <title>Pusat Komando Judul</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; text-align: center; }
        .box { background: white; padding: 20px; border-radius: 10px; max-width: 500px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #27ae60; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; width: 100%; }
        button:hover { background: #219150; }
        #status { margin-top: 15px; font-size: 14px; color: #666; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Update Judul Hari Ini</h2>
        <div id="inputs">
            <input type="text" class="judul" placeholder="Judul 1">
            <input type="text" class="judul" placeholder="Judul 2">
            <input type="text" class="judul" placeholder="Judul 3">
            <input type="text" class="judul" placeholder="Judul 4">
        </div>
        <button onclick="kirimData()">UPDATE SEMUA WEBSITE</button>
        <div id="status"></div>
    </div>

    <script>
        async function kirimData() {
            const status = document.getElementById('status');
            const inputs = document.querySelectorAll('.judul');
            const listJudul = Array.from(inputs).map(i => i.value).filter(v => v !== "");
            
            if(listJudul.length === 0) return alert("Isi minimal satu judul!");

            status.innerText = "Sedang mengirim...";
            
            // GANTI DENGAN WEB APP URL KAMU
            const url = "https://script.google.com/macros/s/AKfycbzBRXwcAkJBPLvnvOdFuWKqag-XBq2U81kYBx3LyOKGCM0Sqx8WileVfvMa1T6BkEQH6A/exec";

            try {
                await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify({ judul: listJudul })
                });
                status.innerText = "✅ BERHASIL! 4 website telah terupdate.";
                inputs.forEach(i => i.value = ""); // Bersihkan input
            } catch (e) {
                status.innerText = "❌ Gagal mengirim. Cek koneksi.";
            }
        }
    </script>
</body>
</html>
